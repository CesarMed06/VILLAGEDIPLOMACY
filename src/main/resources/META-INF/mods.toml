description='''
Village Diplomacy - A complete reputation and relationship system for Minecraft villagers.

Features:
• Dynamic reputation system with 7 ranks (HERO to VILLAIN)
• Unique villager personalities with custom behaviors
• Hostility and forgiveness system for Iron Golems
• Village naming system with biome-specific names (EN/ES)
• Over 250 contextual messages based on your actions
• Special interactions when placing blocks
• Epic notifications for rank changes with effects
• Reputation only lost when a villager witnesses your actions

Build your reputation by trading, helping villagers, and respecting their property - or become a feared villain!
'''

